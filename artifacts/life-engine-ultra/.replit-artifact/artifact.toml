kind = "mobile"
previewPath = "/"
title = "Life Engine Ultra"
version = "1.0.0"
id = "artifacts/life-engine-ultra"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22690

[services.development]
run = "pnpm --filter @workspace/life-engine-ultra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/life-engine-ultra", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/life-engine-ultra", "run", "serve" ]

[services.env]
PORT = "22690"
BASE_PATH = "/"
